<!DOCTYPE html>

<html class="dark" lang="en"><head data-animations="true">
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pizza Palace - Order Now</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f2930d",
                        "background-light": "#f8f7f5",
                        "background-dark": "#221b10",
                    },
                    fontFamily: {
                        "display": ["Work Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<script src="https://unpkg.com/tailwindcss-animate@1.0.7/lib/index.js"></script></head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-300">
<div class="relative flex min-h-screen w-full flex-col max-w-md mx-auto overflow-x-hidden">
<!-- Header Section -->
<div class="flex items-center p-4 pb-2 justify-between">
<div class="text-primary flex size-12 shrink-0 items-center justify-start cursor-pointer">
<span class="material-symbols-outlined text-3xl">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12">Pizza Palace</h2>
</div>
<!-- Hero Card -->
<div class="@container px-4 py-3">
<div class="w-full bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden bg-primary/10 rounded-xl min-h-[240px] relative shadow-2xl" data-alt="A delicious wood-fired artisanal pizza on a wooden table" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuA_Irgl0JYhxrfI6yc542MeyLRdLVzbaJf8qjtAqo__-qiOrEmrro1InRgxz5Mg8Q_MXB_0QRxupuJz7bkFMFWkPXj6eAZmt3nuDW2qjwbe0ZcRegfqr3wnULphLwS2aic41ZVelvZBpAEiSrS5basagFR7oeGq4XCowngJeIyi9LBvpBVdz5WID0TKG4H4HLIqKArG7uexCYKa09vV75VhChb8KDBzXpdHxaX5OMgJQo0ahgpsfskmhYwJwYy9-AqsSsjufjvdRAo");'>
<div class="absolute inset-0 bg-gradient-to-t from-background-dark/90 to-transparent"></div>
<div class="relative z-10 p-6">
<span class="bg-primary text-white px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest mb-2 inline-block">Digital Menu</span>
<h1 class="text-white text-3xl font-bold leading-tight">Table 5</h1>
<p class="text-white/80 text-sm font-medium">Ready for something delicious?</p>
</div>
</div>
</div>
<!-- Welcome Text -->
<div class="px-6 py-6 text-center animate-in fade-in slide-in-from-top-4 duration-700">
<h2 class="text-slate-900 dark:text-slate-100 tracking-tight text-2xl font-bold leading-tight pb-2">Welcome to Table 5</h2>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-relaxed">Please enter your details to browse our menu and start your dining experience.</p>
</div>
<!-- Input Form Section -->
<div class="flex flex-col gap-5 px-6 py-4">
<div class="flex flex-col gap-2 animate-in fade-in slide-in-from-bottom-4 duration-700">
<label class="flex flex-col w-full">
<p class="text-slate-300 text-sm font-semibold leading-normal pb-2 px-1">Full Name</p>
<div class="relative flex items-center group">
<span class="material-symbols-outlined absolute left-4 text-slate-400 group-focus-within:text-primary transition-colors">person</span>
<input class="form-input flex w-full rounded-2xl text-white focus:outline-0 focus:ring-2 focus:ring-primary/30 border border-white/10 bg-white/5 backdrop-blur-xl h-14 placeholder:text-slate-500 pl-12 pr-4 text-base font-normal shadow-[inset_0_2px_4px_rgba(0,0,0,0.3)] transition-all hover:bg-white/10" placeholder="e.g. John Doe" type="text"/>
</div>
</label>
</div>
<div class="flex flex-col gap-2 animate-in fade-in slide-in-from-bottom-4 duration-1000">
<label class="flex flex-col w-full">
<p class="text-slate-300 text-sm font-semibold leading-normal pb-2 px-1">Mobile Number</p>
<div class="relative flex items-center group">
<span class="material-symbols-outlined absolute left-4 text-slate-400 group-focus-within:text-primary transition-colors">smartphone</span>
<input class="form-input flex w-full rounded-2xl text-white focus:outline-0 focus:ring-2 focus:ring-primary/30 border border-white/10 bg-white/5 backdrop-blur-xl h-14 placeholder:text-slate-500 pl-12 pr-4 text-base font-normal shadow-[inset_0_2px_4px_rgba(0,0,0,0.3)] transition-all hover:bg-white/10" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</label>
</div>
</div>
<!-- Call to Action -->
<div class="mt-auto px-6 py-8">
<button class="group relative w-full h-16 bg-primary rounded-2xl shadow-[0_8px_0_rgb(180,100,0),0_15px_20px_rgba(242,147,13,0.3)] transition-all duration-75 active:shadow-[0_2px_0_rgb(180,100,0)] active:translate-y-1 hover:brightness-110 flex items-center justify-center gap-2 text-white font-bold text-lg overflow-hidden animate-in fade-in slide-in-from-bottom-8 duration-1000 delay-300">
<div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent pointer-events-none"></div>
<span class="relative flex items-center gap-2">
                    Start Ordering
                    <span class="material-symbols-outlined">restaurant_menu</span>
</span>
<div class="absolute -inset-1 bg-primary/20 blur-xl opacity-0 group-hover:opacity-100 transition-opacity"></div>
</button>
<p class="text-center text-slate-400 dark:text-slate-500 text-xs mt-4">
                By continuing, you agree to our Terms of Service
            </p>
</div>
<!-- Footer Spacer -->
<div class="h-6"></div>
</div>
</body></html>
