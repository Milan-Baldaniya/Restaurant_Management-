<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f2930d",
                        "background-light": "#f8f7f5",
                        "background-dark": "#221b10",
                    },
                    fontFamily: {
                        "display": ["Work Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(34, 27, 16, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(242, 147, 13, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(242, 147, 13, 0.1);
            box-shadow: inset 2px 2px 4px rgba(0, 0, 0, 0.4), inset -1px -1px 2px rgba(255, 255, 255, 0.05);
        }
        .glow-button {
            box-shadow: 0 0 20px rgba(242, 147, 13, 0.4), inset 0 2px 4px rgba(255, 255, 255, 0.3);
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark min-h-screen flex flex-col">
<!-- Background Layer -->
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 bg-gradient-to-br from-background-dark via-background-dark/95 to-primary/20"></div>
<div class="absolute inset-0 opacity-40 mix-blend-overlay bg-cover bg-center" data-alt="Blurred professional commercial kitchen interior with stainless steel" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCUCRhuPNxNR43FoLLynzkpiHRhBGwELCmpTXwJAHqGo8Y328Q--A5OWvYcAyHtIm4Hz1cZ9L9klf8YDrmspqIhWO0tdiWOTZhJeWdqUs1Vi4CJhZU4TcdEqeEkJak4wIOkOj5R1R-VkS9l346q3WVnQR7tdSwlT4KxrFlkM_AY4O6haUZ6lgBydG0d3-3lHvZlAyPmiSqji7xwCVwPnixLCH79gnwGtgPngUwLZkpQUf7Y77x-1G3OncY3nvRrLRXiUgZCaWq50EA')">
</div>
</div>
<!-- Navigation -->
<header class="relative z-10 flex items-center justify-between px-6 py-6 md:px-12">
<div class="flex items-center gap-3 text-slate-100">
<div class="size-10 bg-primary rounded-lg flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-background-dark font-bold text-2xl">restaurant_menu</span>
</div>
<div class="flex flex-col">
<h2 class="text-xl font-bold leading-none tracking-tight">KitchenSync</h2>
<span class="text-[10px] uppercase tracking-[0.2em] text-primary font-bold">Enterprise SaaS</span>
</div>
</div>
<button class="flex items-center gap-2 px-4 py-2 rounded-full border border-primary/30 text-primary hover:bg-primary/10 transition-colors text-sm font-semibold">
<span class="material-symbols-outlined text-lg">help_outline</span>
            Support
        </button>
</header>
<!-- Main Content -->
<main class="relative z-10 flex-1 flex items-center justify-center p-6">
<div class="glass-card w-full max-w-[480px] rounded-xl p-8 md:p-12 flex flex-col gap-8">
<div class="text-center">
<h1 class="text-3xl md:text-4xl font-bold text-slate-100 mb-2">Staff Portal</h1>
<p class="text-slate-400 text-sm md:text-base">Secure access for kitchen operations</p>
</div>
<form class="flex flex-col gap-6">
<!-- Email Input -->
<div class="flex flex-col gap-2">
<label class="text-xs font-bold uppercase tracking-widest text-primary/80 ml-1">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xl">mail</span>
<input class="glass-input w-full pl-12 pr-4 py-4 rounded-lg text-slate-100 placeholder:text-slate-600 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all" placeholder="chef@restaurant.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center ml-1">
<label class="text-xs font-bold uppercase tracking-widest text-primary/80">Access Code</label>
<a class="text-[10px] font-bold uppercase tracking-widest text-slate-500 hover:text-primary transition-colors" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xl">lock</span>
<input class="glass-input w-full pl-12 pr-4 py-4 rounded-lg text-slate-100 placeholder:text-slate-600 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Options -->
<div class="flex items-center gap-2 ml-1">
<input class="w-4 h-4 rounded border-slate-700 bg-background-dark text-primary focus:ring-primary focus:ring-offset-background-dark" id="remember" type="checkbox"/>
<label class="text-xs text-slate-400 font-medium" for="remember">Remember this station</label>
</div>
<!-- Login Button -->
<button class="glow-button w-full py-4 bg-primary hover:bg-primary/90 text-background-dark font-bold text-lg rounded-lg flex items-center justify-center gap-2 transition-transform active:scale-[0.98]" type="submit">
<span>Enter Kitchen</span>
<span class="material-symbols-outlined">login</span>
</button>
</form>
<!-- Bottom Branding/Info -->
<div class="pt-4 border-t border-slate-100/10 flex flex-col items-center gap-4">
<p class="text-[10px] text-slate-500 uppercase tracking-widest">Powered by KitchenSync Cloud</p>
<div class="flex gap-4">
<div class="flex items-center gap-1">
<span class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]"></span>
<span class="text-[10px] text-slate-400 font-bold uppercase">System Online</span>
</div>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-[12px] text-slate-400">encrypted</span>
<span class="text-[10px] text-slate-400 font-bold uppercase">SSL Secured</span>
</div>
</div>
</div>
</div>
</main>
<!-- Footer Space -->
<footer class="relative z-10 px-12 py-6 flex flex-wrap justify-center md:justify-between items-center gap-4">
<p class="text-xs text-slate-500 font-medium">© 2024 KitchenSync Technologies Inc.</p>
<div class="flex gap-6">
<a class="text-xs text-slate-500 hover:text-slate-300 transition-colors" href="#">Privacy Policy</a>
<a class="text-xs text-slate-500 hover:text-slate-300 transition-colors" href="#">Terms of Service</a>
<a class="text-xs text-slate-500 hover:text-slate-300 transition-colors" href="#">Station Settings</a>
</div>
</footer>
</body></html>
