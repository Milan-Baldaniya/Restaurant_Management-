<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>

<script id="tailwind-config">tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {

                        "primary": "#f2930d",

                    fontFamily: {
                        "display": ["Work Sans"]

                    boxShadow: {
                        "3d-depth": "0 20px 40px -15px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.1)",

                },
            },
        }</script>
<title>My Orders</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased" style="perspective: 1000px; scroll-behavior: smooth;">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<!-- Header -->
<header class="sticky top-0 z-30 bg-background-dark/60 backdrop-blur-xl border-b border-white/5">
<div class="flex items-center p-4 justify-between">
<button class="flex size-10 items-center justify-center rounded-full bg-white/5 hover:bg-white/10 transition-all">
<span class="material-symbols-outlined text-white">arrow_back</span>
</button>
<h2 class="text-lg font-bold leading-tight tracking-tight flex-1 text-center text-white">My Orders</h2>
<div class="size-10"></div>
</div>
<div class="px-4 pb-4">
<div class="relative flex p-1 bg-white/5 rounded-xl border border-white/10 backdrop-blur-md shadow-inner">
<div class="absolute inset-y-1 left-1 w-[calc(50%-4px)] bg-primary rounded-lg shadow-lg transform transition-transform duration-300 ease-out translate-x-0 z-0" id="tab-indicator"></div>
<button class="relative z-10 flex-1 py-2 text-sm font-bold text-background-dark text-center" onclick="document.getElementById('tab-indicator').style.transform='translateX(0)'">
                Active
            </button>
<button class="relative z-10 flex-1 py-2 text-sm font-bold text-white/60 text-center" onclick="document.getElementById('tab-indicator').style.transform='translateX(100%)'">
                Previous
            </button>
</div>
</div>
</header>
<!-- Main Content (Scrollable Area) -->

</div>
<div class="p-5 space-y-4">
<div class="flex justify-between items-start">
<div>

<p class="text-xs text-white/40 uppercase tracking-widest mt-1">Tech Accessories • 2 Items</p>
</div>
<span class="text-2xl font-black text-primary">$45.00</span>
</div>
<div class="flex items-center gap-3 text-sm text-white/60">
<span class="material-symbols-outlined text-primary">local_shipping</span>

</div>
<div class="flex gap-3">

<button class="px-4 bg-white/5 border border-white/10 rounded-xl text-white hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined">more_horiz</span>

</div>
</div>
</div>
</div>
<!-- Order Card 2 -->

<div class="relative aspect-[16/9] overflow-hidden">
<img alt="Order 2" class="w-full h-full object-cover transform group-hover:scale-110 transition-transform duration-700" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCV7h3FvYLGPEfQzx1xKSratzFZ0NpSygImgf5rxz4l3vcAxgjHWiqXc5I4VE093H9YpUhI67W3Xg6hLLg84haM83czinw1qz45L407tBkEsP_rUyxkoPyn0OkIBrn-EaHDOYYXfIDN-fHVMHMNKwEjWBfL8c8tmgdcdQQuSAvilgFAeZWmS5nzSXGRPcjuRY1BEKmi-RU0tn6rVOJI8wGNOIrvDZj_DTj7ptCJHoAzNNCjKESQCEx8gzmatxcGyEeMwU4etb5e13o"/>

</div>

<div class="flex justify-between items-start">
<div>
<h3 class="text-xl font-bold text-white">Order #88102</h3>
<p class="text-xs text-white/40 uppercase tracking-widest mt-1">Smart Devices • 1 Item</p>
</div>
<span class="text-2xl font-black text-primary">$120.50</span>
</div>
<div class="flex items-center gap-3 text-sm text-white/60">
<span class="material-symbols-outlined text-white/40">calendar_today</span>
<span>Placed Oct 20</span>
</div>
<div class="flex gap-3">
<button class="flex-1 bg-white/5 border border-white/10 text-white py-3 rounded-xl font-black text-sm hover:bg-white/10 transition-all uppercase tracking-tighter">

<button class="px-4 bg-white/5 border border-white/10 rounded-xl text-white hover:bg-white/10 transition-colors">

</div>
</div>
</div>
</div>

<nav class="fixed bottom-0 left-0 right-0 z-40 px-6 pb-8 pt-2">
<div class="max-w-md mx-auto bg-slate-900/60 backdrop-blur-2xl border border-white/10 rounded-3xl p-2 flex items-center justify-around shadow-2xl">
<a class="flex flex-col items-center p-3 text-white/40 hover:text-primary transition-all">
<span class="material-symbols-outlined">home</span>
</a>
<a class="flex flex-col items-center p-4 bg-primary rounded-2xl text-background-dark shadow-lg shadow-primary/20 transform scale-110">

</a>
<a class="flex flex-col items-center p-3 text-white/40 hover:text-primary transition-all">
<span class="material-symbols-outlined">shopping_cart</span>
</a>
<a class="flex flex-col items-center p-3 text-white/40 hover:text-primary transition-all">
<span class="material-symbols-outlined">person</span>
</a>
</div>
</nav>
</div>
